name: CI/CD — todo-list

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  # ── CI: Test ────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest

  # ── CI: Build and push to ECR ───────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          docker build \
            -t $REGISTRY/todo-list-devops-dev-frontend:$IMAGE_TAG \
            -t $REGISTRY/todo-list-devops-dev-frontend:latest \
            ./frontend
          docker push $REGISTRY/todo-list-devops-dev-frontend:$IMAGE_TAG
          docker push $REGISTRY/todo-list-devops-dev-frontend:latest

      - name: Build and push backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          docker build \
            -t $REGISTRY/todo-list-devops-dev-backend:$IMAGE_TAG \
            -t $REGISTRY/todo-list-devops-dev-backend:latest \
            ./backend
          docker push $REGISTRY/todo-list-devops-dev-backend:$IMAGE_TAG
          docker push $REGISTRY/todo-list-devops-dev-backend:latest

    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

  # ── CD: Deploy to EKS ───────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name todo-list-devops-dev-eks-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Deploy via Helm
        env:
          REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          helm upgrade --install todo-app ./helm/todo-app \
            --namespace todo \
            --create-namespace \
            --set frontend.image.repository=$REGISTRY/todo-list-devops-dev-frontend \
            --set frontend.image.tag=$IMAGE_TAG \
            --set backend.image.repository=$REGISTRY/todo-list-devops-dev-backend \
            --set backend.image.tag=$IMAGE_TAG \
            --wait