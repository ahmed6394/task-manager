name: CI/CD for todo-list App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: todo-list
  IMAGE_TAG: v1
  CONTAINER_NAME: todo-list

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest \
            ./frontend

          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest

      - name: Build and push backend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest \
            ./backend

          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

  deploy:
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to AWS EC2
        run: |
          echo "${{ secrets.AWS_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << EOF
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              if dpkg -s containerd.io >/dev/null 2>&1; then
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli
              else
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
              fi
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ env.IMAGE_TAG }}
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ env.IMAGE_TAG }}

            sudo docker stop todo-frontend || true
            sudo docker rm todo-frontend || true
            sudo docker stop todo-backend || true
            sudo docker rm todo-backend || true
            sudo docker run -d \
              --name todo-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ env.IMAGE_TAG }}

            sudo docker run -d \
              --name todo-frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ env.IMAGE_TAG }}
          EOF